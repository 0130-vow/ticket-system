version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ticket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ticket_db
      MYSQL_USER: ticket
      MYSQL_PASSWORD: ticket123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ticket-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticket_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ticket
      SPRING_DATASOURCE_PASSWORD: ticket123
      JWT_SECRET: ticket-system-jwt-secret-key-2024
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ticket-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ticket-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  ticket-network:
    driver: bridge
